[build]
  command = "npm install && node cms-build.js"
  publish = "."
  functions = "netlify/functions"
[build.environment]
  NODE_VERSION = "18"

# Static art — never changes, cache aggressively
[[headers]]
  for = "/images/art-*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CMS uploads — new files added regularly, short cache so they appear without hard refresh
[[headers]]
  for = "/images/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
